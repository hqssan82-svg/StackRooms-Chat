<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up to StackRooms</title>
    <link rel="stylesheet" href="style.css">
    <link rel="prefetch" href="login.html">
</head>
<body>
    <div id="main-signup-div">
        <div id="signup-card-div">
            <h1 id="signup-h1">Sign Up to StackRooms Chat</h1>
            <input type="text" placeholder="Type In Your Email" id="email-password-input">
            <div id="singup-buttons-div">
                <button id="switch-to-login-button" class="buttons">Already Have An Account ?</button>
                <button id="signup-confirm-button" class="buttons">Confirm</button>
            </div>
        </div>
    </div>

    <script src="index.js" type="module"></script>
</body>
</html>
