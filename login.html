<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login To StackRooms Chat</title>
    <link rel="stylesheet" href="style.css">
    <link rel="prefetch" href="signUp.html">
</head>
<body>
    <div id="main-login-div">
        <div id="signup-card-div">
            <h1 id="signup-h1">Login to StackRooms</h1>
            <input type="text" id="email-password-input-login" placeholder="Type In Your Email">
            <div id="login-buttons-div">
                <button id="sign-up-button" class="buttons">Sign Up</button>
                <button id="confirm-login-button" class="buttons">Confirm</button>
            </div>
        </div>
    </div>
    <script src="index.js" type="module"></script>
</body>
</html>
